name: Daily IMGW Water Temperature Data Fetch

on:
  schedule:
    # Runs everyday at 07:30 UTC (which is 08:30 or 09:30 Polish time depending on DST)
    - cron: '30 7 * * *'
  workflow_dispatch: # Allows manual trigger via the GitHub Actions tab

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants write permissions to commit the updated CSV back to the repo

    steps:
    # 1. Checkout repository code
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install required dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pdfplumber pandas

    # 4. Run the data extraction script
    - name: Run data extraction script
      run: python imgw_script.py

    # 5. Commit and push the updated CSV file back to the repository
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add temp.csv
        # Only commit and push if there are actual changes to prevent workflow errors
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data update: $(date +'%Y-%m-%d')" && git push)
